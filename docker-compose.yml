services:
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: bagisto_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - bagisto_app:/var/www/html
      - ./scripts:/var/www/scripts
    environment:
      - APP_ENV=local
    networks:
      - bagisto_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    container_name: bagisto_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - bagisto_app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bagisto_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: bagisto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: bagisto_corporate
      MYSQL_USER: bagisto
      MYSQL_PASSWORD: bagisto123
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - bagisto_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bagisto_redis
    restart: unless-stopped
    networks:
      - bagisto_net

volumes:
  bagisto_app:
  mysql_data:

networks:
  bagisto_net:
    driver: bridge
